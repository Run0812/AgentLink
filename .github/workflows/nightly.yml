name: Nightly Build

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: '0 2 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-commits:
    name: Check for recent commits on main
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 50   # enough to cover a day's worth of commits

      - name: Check commits in last 24 hours
        id: check
        run: |
          COUNT=$(git log --oneline --since="24 hours ago" | wc -l)
          echo "Commits in last 24h: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No new commits on main – skipping nightly build."
          fi

  nightly-build:
    name: Nightly Build
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build:quick

      - name: Verify build artifacts
        run: |
          for f in build/main.js build/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing artifact: $f"
              exit 1
            fi
            echo "✅ $f ($(du -sh "$f" | cut -f1))"
          done

      - name: Upload nightly artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agentlink-nightly-${{ github.run_id }}
          path: |
            build/main.js
            build/manifest.json
            build/styles.css
          if-no-files-found: warn
          # Keep nightly artifacts for 3 days to avoid storage bloat
          retention-days: 3
