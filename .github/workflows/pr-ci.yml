name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Install / Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build:quick

      - name: Verify build artifacts
        run: |
          for f in build/main.js build/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "Missing expected artifact: $f"
              exit 1
            fi
          done
          echo "Build artifacts present"
