name: Bug Report
description: Report a bug in AgentLink
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: e.g. 1.7.7
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open AgentLink panel
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs (if any)
      description: Open the developer console (Ctrl+Shift+I) and paste relevant output here.
      render: shell
